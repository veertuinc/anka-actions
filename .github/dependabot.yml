version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 0

  # Single root entry: npm workspaces share one lockfile at the repo root,
  # which covers the common/, up/, and down/ packages.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 0
