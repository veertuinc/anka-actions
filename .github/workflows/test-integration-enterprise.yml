name: 'test-enterprise'
on:
  pull_request:
  workflow_dispatch:

jobs:

  action-up:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./up
        id: action-up
        with:
          gh-base-url: "https://ghe.veertu.com/api/v3"
          gh-pat: ${{ secrets.TEST_PAT }}
          template-id: '814427ce-6b9f-4568-bc05-ef0495d95192'
          controller-url: ${{ secrets.CONTROLLER_URL }}
          controller-auth-cert: ${{ secrets.CONTROLLER_VEERTU_COM_CERT }}
          controller-auth-cert-key: ${{ secrets.CONTROLLER_VEERTU_COM_KEY }}
          template-runner-dir: "/Users/jenkins/actions-runner"
    outputs:
      action-id: ${{ steps.action-up.outputs.action-id }}

  inside_vm_job:
    needs: action-up
    runs-on: [ self-hosted, "${{ needs.action-up.outputs.action-id }}" ]
    steps:
      - name: Inside VM Job
        id: inside_vm_job
        run: |
          echo "running the actual job 1 on runner ${{ needs.action-up.outputs.action-id }}"
          echo "user: $USER"
          echo "home: $HOME"

  action_down:
    if: always()
    needs: [ action-up, inside_vm_job ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./down
        with:
          gh-base-url: "https://ghe.veertu.com/api/v3"
          action-id: ${{ needs.action-up.outputs.action-id }}
          gh-pat: ${{ secrets.TEST_PAT }}
          controller-url: ${{ secrets.CONTROLLER_URL }}
          controller-auth-cert: ${{ secrets.CONTROLLER_VEERTU_COM_CERT }}
          controller-auth-cert-key: ${{ secrets.CONTROLLER_VEERTU_COM_KEY }}
