# `dist/index.js` is a special file in Actions.
# When you reference an action with `uses:` in a workflow,
# `index.js` is the code that will run.
# For our project, we generate this file through a build process from other source files.
# We need to make sure the checked-in `index.js` actually matches what we expect it to be.
#
# Because up/ and down/ bundle the local common/ workspace, a change to common/
# that is not followed by re-packaging up/ and down/ will fail this check.
name: Check dist/

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  check-dist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install

      - name: Build the common library
        run: npm run build --workspace common

      - name: Rebuild the dist/ directories for up and down
        run: |
          npm run build --workspace up
          npm run package --workspace up
          npm run build --workspace down
          npm run package --workspace down

      - name: Compare the expected and actual dist/ directories
        run: |
          if [ "$(git diff --ignore-space-at-eol up/dist down/dist | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build.  See status below:"
            git diff
            exit 1
          fi
        id: diff

      # If a dist/ was different from expected, upload the expected version as an artifact
      - uses: actions/upload-artifact@v7
        if: ${{ failure() && steps.diff.conclusion == 'failure' }}
        with:
          name: dist
          path: |
            up/dist/
            down/dist/
