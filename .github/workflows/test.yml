name: 'build-test'
on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - edge
      - 'releases/*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Single install at the repo root resolves the npm workspaces
      # (common, up, down) and links common into up/down.
      - run: npm install
      # Runs each workspace's `all` script in workspace order (common first),
      # so up/down build and bundle against the freshly built local common.
      - run: npm run all --workspaces --if-present
